<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Countdown Timer</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="page-countdown">

  <div class="countdown-wrapper">
    <p class="event-label">COUNTING DOWN TO</p>
    <h1 class="event-title" id="eventTitle">Coming Soon</h1>

    <div class="timer" id="timer">
      <div class="timer-block">
        <span class="timer-value" id="days">00</span>
        <span class="timer-label">Days</span>
      </div>
      <div class="timer-separator">:</div>
      <div class="timer-block">
        <span class="timer-value" id="hours">00</span>
        <span class="timer-label">Hours</span>
      </div>
      <div class="timer-separator">:</div>
      <div class="timer-block">
        <span class="timer-value" id="minutes">00</span>
        <span class="timer-label">Minutes</span>
      </div>
      <div class="timer-separator">:</div>
      <div class="timer-block">
        <span class="timer-value" id="seconds">00</span>
        <span class="timer-label">Seconds</span>
      </div>
    </div>

    <div class="expired-message" id="expiredMessage">
      <span>🎉 It's time!</span>
    </div>
  </div>

  <a class="admin-link" href="admin.html">⚙ Configure</a>

  <script src="script.js"></script>
</body>
</html>
